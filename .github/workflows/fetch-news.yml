name: Fetch Daily News

on:
  schedule:
    # 每天北京时间 10:00 = UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch-rss.py'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run RSS fetcher
        run: python scripts/fetch-rss.py

      - name: Commit updated articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: fetch daily news $(date +'%Y-%m-%d')"
            git push
          fi

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Notes de Laurette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <h1>Les Notes de Laurette</h1>
  <p>Actualités francophones &amp; veille technologique</p>
</header>

<div class="market-bar" id="market-bar"></div>

<div class="dict-bar">
  <form class="dict-form" id="dict-form" autocomplete="off">
    <span class="dict-icon">📖</span>
    <input type="text" class="dict-input" id="dict-input" placeholder="Chercher un mot français…" />
    <button type="submit" class="dict-btn" id="dict-btn">Rechercher</button>
    <span class="dict-back" id="dict-back" style="display:none">← Retour</span>
  </form>
  <div class="dict-status" id="dict-status"></div>
</div>

<main>
  <section class="filters">
    <button class="filter-btn active" data-filter="all">Tous</button>
    <button class="filter-btn region" data-filter="francophonie">🇫🇷 Francophonie</button>
    <button class="filter-btn region" data-filter="chine">🇨🇳 Chine</button>
    <button class="filter-btn region" data-filter="etats-unis">🇺🇸 États-Unis</button>
    <button class="filter-btn region" data-filter="europe">🇪🇺 Europe</button>
    <button class="filter-btn region" data-filter="international">🌍 International</button>
  </section>

  <section id="dict-results" class="dict-results"></section>
  <section id="article-list" class="article-list">
    <div class="empty-state" id="loading-state">Chargement…</div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
